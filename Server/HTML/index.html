<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Clash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>ASCII Clash</h1>

    <div id="error-msg" class="msg-error" style="display:none;"></div>

    <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="enter name" autocomplete="off">

        <label for="password">Password</label>
        <input type="password" id="password" name="password">

        <input type="submit" value="[ LOGIN ]">
    </form>

    <a href="register.html">&gt; new player? register here</a>
</div>

<script type="module">
    import {shake, showError, hideMsg, postForm} from '/utils.js';

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-msg');
    const container = document.querySelector('.container');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMsg(errorBox);

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const res = await postForm('/login', {username, password});

        if (res.ok) {
            sessionStorage.setItem('username', username);
            window.location.href = '/home.html';
        } else {
            const msg = await res.text();
            showError(errorBox, msg);
            shake(container);
        }
    });
</script>
</body>
</html>
